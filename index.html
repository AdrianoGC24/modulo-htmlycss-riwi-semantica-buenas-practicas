<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Semántico</title>
</head>
<body>

    <!-- HEADER: Encabezado principal del sitio (logo, título, etc.) -->
    <header>
        <h1>Mi Sitio Web</h1>

        <!-- NAV: Contiene enlaces de navegación -->
        <nav>
            <ul>
                <!-- UL/LI: Lista de enlaces -->
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Servicios</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <!-- MAIN: Contenido principal de la página -->
    <main>

        <!-- ASIDE: Contenido secundario (barra lateral, info extra, anuncios, etc.) -->
        <aside>
            <h2>Información adicional</h2>
            <p>Este es contenido secundario relacionado.</p>
        </aside>

        <!-- SECTION: Agrupa contenido relacionado -->
        <section>

            <!-- ARTICLE: Contenido independiente (post, noticia, card, etc.) -->
            <article>

                <!-- HEADER dentro de article: encabezado del artículo -->
                <header>
                    <h2>Título del artículo</h2>
                </header>

                <!-- FIGURE: Contenido visual (imagen, gráfico, etc.) -->
                <figure>
                    <img src="https://via.placeholder.com/150" alt="Imagen de ejemplo">
                    <figcaption>Descripción de la imagen</figcaption>
                </figure>

                <!-- P: Párrafo de texto -->
                <p>
                    Este es un párrafo dentro del artículo. Aquí va el contenido principal.
                </p>

                <!-- FOOTER dentro de article: información adicional del artículo -->
                <footer>
                    <p>Publicado por Adriano</p>
                </footer>

            </article>

        </section>

    </main>

    <!-- FOOTER: Pie de página del sitio -->
    <footer>
        <p>&copy; 2026 Mi Sitio Web</p>
    </footer>

</body>
</html>
